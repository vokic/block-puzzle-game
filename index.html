<!DOCTYPE html>
<html lang="en">

<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080816;--bg2:#0e0e24;--text:#e8eaf6;--sub:#4a4d6a;--accent:#6c63ff;--green:#00c853;--pink:#ff3d7f;--gold:#ffd54f;--cell:32px;--gap:2px;--step:34px;--card:rgba(255,255,255,.02);--card-border:rgba(255,255,255,.04);--cell-bg:rgba(255,255,255,.025);--cell-border:rgba(255,255,255,.04);--shine:rgba(255,255,255,.2);--tray:rgba(255,255,255,.015);--tray-border:rgba(255,255,255,.04);--board-bg:rgba(255,255,255,.012);--board-border:rgba(255,255,255,.04);--board-shadow:0 16px 48px rgba(0,0,0,.3);--orb-opacity:.06;--qp-bg:linear-gradient(135deg,rgba(108,99,255,.08),rgba(255,61,127,.08));--qp-border:rgba(108,99,255,.2);--btn-bg:rgba(255,255,255,.04);--btn-border:rgba(255,255,255,.07);--btn-hover:rgba(255,255,255,.08);--badge-bg:rgba(255,255,255,.04);--overlay-bg:rgba(0,230,118,.05);--overlay-border:rgba(0,230,118,.15);--win-btn-sec-bg:rgba(255,255,255,.05);--win-btn-sec-border:rgba(255,255,255,.08)}
[data-theme="light"]{--bg:#f0f1f5;--bg2:#e4e5ec;--text:#1a1a2e;--sub:#6b6f8a;--accent:#5046e5;--green:#00a844;--pink:#e03060;--gold:#d4a017;--card:rgba(0,0,0,.03);--card-border:rgba(0,0,0,.07);--cell-bg:rgba(0,0,0,.04);--cell-border:rgba(0,0,0,.08);--shine:rgba(255,255,255,.35);--tray:rgba(0,0,0,.03);--tray-border:rgba(0,0,0,.06);--board-bg:rgba(0,0,0,.025);--board-border:rgba(0,0,0,.08);--board-shadow:0 12px 40px rgba(0,0,0,.08);--orb-opacity:.04;--qp-bg:linear-gradient(135deg,rgba(80,70,229,.06),rgba(224,48,96,.06));--qp-border:rgba(80,70,229,.15);--btn-bg:rgba(0,0,0,.04);--btn-border:rgba(0,0,0,.08);--btn-hover:rgba(0,0,0,.07);--badge-bg:rgba(0,0,0,.05);--overlay-bg:rgba(0,168,68,.07);--overlay-border:rgba(0,168,68,.2);--win-btn-sec-bg:rgba(0,0,0,.05);--win-btn-sec-border:rgba(0,0,0,.08)}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);display:flex;justify-content:center;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;overscroll-behavior:none}
#app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:var(--orb-opacity);pointer-events:none;z-index:0}

/* MENU */
#menu{display:flex;flex-direction:column;align-items:center;padding:36px 18px 72px;position:relative;z-index:10;justify-content:center;min-height:100vh}
#menu h1{font-size:38px;font-weight:900;letter-spacing:-1.2px;margin:4px 0;background:linear-gradient(135deg,#6c63ff,#ff3d7f,#ffd54f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#menu .sub{color:var(--sub);font-size:13px;letter-spacing:1px;margin-bottom:34px}
.carousel{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;margin-bottom:30px}
.carousel-cat-name{font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--sub);margin-bottom:18px;transition:color .3s}
.carousel-row{display:flex;align-items:center;gap:18px;width:100%;justify-content:center;margin-bottom:18px}
.carousel-arrow{width:54px;height:54px;border-radius:15px;border:1px solid var(--btn-border);background:var(--btn-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:'Outfit',sans-serif}
.carousel-arrow:hover{background:var(--btn-hover);border-color:var(--accent)}
.carousel-arrow .material-icons{font-size:28px;color:var(--text)}
.carousel-preview{width:210px;height:210px;border-radius:22px;border:1px solid var(--card-border);background:var(--card);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:16px}
.carousel-icon{display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.carousel-icon .material-icons{font-size:36px}
.carousel-shape{display:flex;align-items:center;justify-content:center}
.carousel-progress{font-size:32px;font-weight:900;letter-spacing:-1px;margin-top:14px}
.carousel-progress-sub{font-size:11px;color:var(--sub);font-weight:600}
.carousel-levels{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;max-width:340px}
.carousel-dot{width:30px;height:30px;border-radius:8px;border:1px solid var(--btn-border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .15s}
.carousel-dot:hover{background:var(--btn-hover)}
.carousel-dot.done{border-color:rgba(0,230,118,.25);color:var(--green)}
.carousel-dot.current{border-color:rgba(108,99,255,.4);color:var(--accent);background:rgba(108,99,255,.1)}
.carousel-dot.locked{opacity:.3;cursor:default}
.play-btn{padding:16px 54px;border-radius:15px;border:none;font-size:18px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.5px;transition:all .2s;margin-bottom:28px}
.play-btn:hover{transform:translateY(-1px)}
.divider{width:80px;height:1px;background:var(--card-border);margin-bottom:24px}
.quick-play{width:100%;max-width:360px;text-align:center}
.quick-play .qp-title{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:14px}
.quick-play .qp-btns{display:flex;gap:9px}
.qp-btn{flex:1;padding:15px 10px;border-radius:13px;border:1px solid var(--btn-border);background:var(--btn-bg);cursor:pointer;text-align:center;font-family:'Outfit',sans-serif;transition:all .2s}
.qp-btn:hover{background:var(--btn-hover)}
.qp-btn .ql{font-size:15px;font-weight:800;letter-spacing:.5px}
.qp-btn .qi{font-size:11px;color:var(--sub);margin-top:3px}

/* GAME */
#game{display:none;flex-direction:column;align-items:center;padding:8px 8px 100px;position:relative;z-index:10;width:100%}
.game-header{display:flex;align-items:center;width:100%;justify-content:space-between;padding:4px 0 6px}
.hdr-btn{background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:9px;padding:9px 14px;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.hdr-btn:hover{background:var(--btn-hover);color:var(--text)}
.game-info{font-size:19px;font-weight:700}

.game-main{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}

/* Next preview */
.next-preview{display:flex;align-items:center;gap:11px;margin-top:12px;padding:11px 20px;border-radius:13px;background:var(--card);border:1px solid var(--card-border)}
.next-label{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px}
.next-thumb{display:flex;align-items:center;justify-content:center}
.next-name{font-size:14px;color:var(--text);font-weight:700}

.progress-row{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px}
.progress-bar{flex:1;height:3px;border-radius:2px;background:var(--card);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;width:0%;transition:width .5s cubic-bezier(.22,1,.36,1)}
.hint-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:1px solid rgba(255,212,84,.25);background:rgba(255,212,84,.06);color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;flex-shrink:0}
.hint-btn:hover:not(:disabled){background:rgba(255,212,84,.12)}
.hint-btn:disabled{opacity:.35;cursor:default;border-color:var(--card-border);color:var(--sub)}
.level-badge{font-size:11px;font-weight:800;color:var(--sub);background:var(--badge-bg);padding:4px 10px;border-radius:7px;margin-bottom:8px;letter-spacing:.5px}

#board-wrap{position:relative;border-radius:14px;background:var(--board-bg);border:2px solid var(--board-border);box-shadow:var(--board-shadow);flex-shrink:0;padding:10px}
.cell{position:absolute;border-radius:5px;width:var(--cell);height:var(--cell);background:var(--cell-bg);border:1px solid var(--card-border);overflow:hidden;touch-action:none}
.cell .shine{position:absolute;top:2px;left:2px;right:2px;height:33%;border-radius:3px;background:var(--shine);opacity:0}
.cell.filled .shine{opacity:1}
.cell.hover-good{background:rgba(99,200,255,.2)!important;border-color:rgba(99,200,255,.4)!important}
.cell.hover-bad{background:rgba(255,61,127,.1)!important;border-color:rgba(255,61,127,.25)!important}

#tray{margin-top:10px;width:100%}
.tray-header{display:flex;justify-content:space-between;padding:0 4px;margin-bottom:5px}
.tray-label{color:var(--sub);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px}
#tray-pieces{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border-radius:10px;background:var(--tray);border:1px solid var(--card-border);min-height:46px;align-items:center}
.tray-piece{cursor:grab;padding:4px;border-radius:7px;background:var(--card);border:1px solid var(--card-border);touch-action:none;transition:border-color .2s}
.tray-piece.hinted{border-width:2px}

#drag-ghost{position:fixed;pointer-events:none;z-index:1000;opacity:0;display:none}
#win-bar{display:none;margin-top:18px;align-items:stretch;justify-content:center;gap:10px;width:100%;max-width:380px}
.win-btn{flex:1;padding:17px 8px;border-radius:14px;border:1px solid var(--overlay-border);background:var(--overlay-bg);color:var(--green);cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.win-btn:hover{background:rgba(0,200,100,.12);transform:translateY(-2px)}
.win-btn.primary{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 8px 24px rgba(0,200,100,.32)}
.win-btn.primary:hover{background:#00d65a}
.particle{position:fixed;pointer-events:none;z-index:998;border-radius:50%}
.sound-toggle,.theme-toggle{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);z-index:100;width:42px;height:42px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Outfit',sans-serif}
.theme-toggle{right:calc(env(safe-area-inset-right,0px) + 12px)}
.sound-toggle{right:calc(env(safe-area-inset-right,0px) + 62px)}
.sound-toggle:hover,.theme-toggle:hover{background:var(--cell-bg);border-color:var(--accent)}
.theme-toggle .material-icons{font-size:23px;color:var(--text)}
.theme-toggle .material-icons.light{color:var(--gold)}
.sound-toggle .material-icons{font-size:24px;color:var(--text)}
.sound-toggle.muted .material-icons{color:var(--sub);opacity:.65}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" title="Toggle theme"><span class="material-icons">dark_mode</span></button>
<div class="bg-orb" style="width:300px;height:300px;background:#6c63ff;top:-50px;left:-80px"></div>
<div class="bg-orb" style="width:250px;height:250px;background:#ff3d7f;bottom:10%;right:-60px"></div>
<div id="menu"></div>
<div id="game">
  <div class="game-main">
    <div class="game-header">
      <button class="hdr-btn" id="btn-back">← Back</button>
      <div class="game-info" id="game-info"></div>
      <button class="hdr-btn" id="btn-reset">↺</button>
    </div>
    <div class="level-badge" id="level-badge"></div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <button class="hint-btn" id="hint-btn"><span style="font-size:11px;letter-spacing:.5px">HINT</span><span id="hint-count">3</span></button>
    </div>
    <div id="board-wrap"></div>
    <div id="win-bar">
      <button class="win-btn primary" id="win-next">NEXT</button>
      <button class="win-btn" id="win-retry">REPLAY</button>
      <button class="win-btn" id="win-menu">MENU</button>
    </div>
    <div id="next-preview" class="next-preview"></div>
    <div id="tray">
      <div class="tray-header"><span class="tray-label">Pieces</span><span class="tray-label" id="tray-count"></span></div>
      <div id="tray-pieces"></div>
    </div>
  </div>
</div>
<div id="drag-ghost"></div>
</div>
<script>
// ════════════════════════════════════════
//  SHAPE DATA — 5 categories × 10 shapes
// ════════════════════════════════════════
const ICONS = {
  animals: `<span class="material-icons">pets</span>`,
  food: `<span class="material-icons">restaurant</span>`,
  vehicles: `<span class="material-icons">directions_car</span>`,
  structures: `<span class="material-icons">account_balance</span>`,
  shapes: `<span class="material-icons">category</span>`,
};
const CATEGORIES = [
  { id:'animals', name:'Animals', icon:'animals', color:'#06d6a0', shapes:[
    {name:'Fish',s:['..#..','..###','.####','#####','.####','..###','..#..']},

    {name:'Cat',s:['#...#','##.##','#####','#####','.###.','.#.#.']},

  { id:'vehicles', name:'Vehicles', icon:'vehicles', color:'#4dabf7', shapes:[

  ]},
  { id:'structures', name:'Structures', icon:'structures', color:'#ffd43b', shapes:[
    {name:'Pyramid',s:['...#...','..###..','.#####.','#######']},
    {name:'House',s:['..##..','.####.','######','.####.','.####.','.#..#.']},
    {name:'Castle',s:['#.#.#','#####','.###.','.###.','.###.','#####']},

    {name:'Lighthouse',s:['..#..','.###.','..#..','.###.','.###.','####.','#####']},
    {name:'Windmill',s:['..#..','.###.','##.##','.###.','..#..','..#..','.###.']},

  { id:'shapes', name:'Basic Shapes', icon:'shapes', color:'#cc5de8', shapes:[
    {name:'Square',s:['#####','#####','#####','#####','#####']},
    {name:'Triangle',s:['....#','...##','..###','.####','#####']},
    {name:'Diamond',s:['..#..','.###.','#####','.###.','..#..']},
    {name:'Heart',s:['.##.##.','#######','#######','.#####.','..###..','...#...']},
    {name:'Cross',s:['.###.','.###.','#####','#####','#####','.###.','.###.']},
    {name:'Arrow',s:['...#...','..###..','.#####.','#######','..###..','..###..','..###..']},
    {name:'Star',s:['...#...','..###..','#######','.#####.','.##.##.','##...##']},
    {name:'Hexagon',s:['.####.','######','######','######','.####.']},
    {name:'Moon',s:['.###','####','###.','####','.###']},
    {name:'Lightning',s:['..##','..#.','.###','.#..','##..','#...']},
  ]},
];

const PALETTE=["#f72585","#7209b7","#3a86ff","#4cc9f0","#06d6a0","#f77f00","#e63946","#ffbe0b","#8338ec","#00b4d8","#ef476f","#118ab2","#ffd166","#fb5607","#9b5de5"];
const CELL=32,GAP=2,STEP=34,TRAY_CELL=22;

// ════════════════════════════════════════
//  CORE UTILS
// ════════════════════════════════════════
function mkRng(s){s=s||1;return()=>{s=Math.imul(s,48271)%2147483647;return(s&0x7fffffff)/2147483647};}
function ky(r,c){return r+','+c}
function parseShape(shape){
  const cells=[],h=shape.length,w=Math.max(...shape.map(r=>r.length));
  for(let r=0;r<h;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c]==='#')cells.push([r,c]);
  return{cells,gridW:w,gridH:h};
}
function decompose(tc,np,seed){
  const rng=mkRng(seed),dirs=[[0,1],[0,-1],[1,0],[-1,0]];
  const rem=new Set(tc.map(([r,c])=>ky(r,c)));
  const n=Math.min(np,tc.length),bs=Math.floor(tc.length/n),ex=tc.length-bs*n;
  const ra=[...rem];for(let i=ra.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[ra[i],ra[j]]=[ra[j],ra[i]];}
  const seeds=[ra[0]];
  while(seeds.length<n){let bk=null,bd=-1;for(const k of ra){if(seeds.includes(k))continue;const[r,c]=k.split(',').map(Number);let md=1e9;for(const sk of seeds){const[sr,sc]=sk.split(',').map(Number);md=Math.min(md,Math.abs(r-sr)+Math.abs(c-sc));}if(md>bd){bd=md;bk=k;}}if(bk)seeds.push(bk);else break;}
  const pcs=seeds.map(s=>{rem.delete(s);return new Set([s]);});
  const sz=seeds.map((_,i)=>bs+(i<ex?1:0));
  let ch=true;while(ch&&rem.size>0){ch=false;for(let i=0;i<pcs.length;i++){if(pcs[i].size>=sz[i])continue;const fr=[];for(const k of pcs[i]){const[r,c]=k.split(',').map(Number);for(const[dr,dc]of dirs){const nk=ky(r+dr,c+dc);if(rem.has(nk))fr.push(nk);}}if(!fr.length)continue;const p=fr[Math.floor(rng()*fr.length)];pcs[i].add(p);rem.delete(p);ch=true;}}
  for(const k of rem){const[r,c]=k.split(',').map(Number);let bi=0,bd=1e9;for(let i=0;i<pcs.length;i++)for(const pk of pcs[i]){const[pr,pc]=pk.split(',').map(Number);const d=Math.abs(r-pr)+Math.abs(c-pc);if(d<bd){bd=d;bi=i;}}pcs[bi].add(k);}
  return pcs.map((ps,i)=>{const cells=[...ps].map(k=>k.split(',').map(Number));const mr=Math.min(...cells.map(c=>c[0])),mc=Math.min(...cells.map(c=>c[1]));return{cells,normalized:cells.map(([r,c])=>[r-mr,c-mc]),colorIdx:i};});
}

// Difficulty for progression levels: 1-3=easy,4-6=med,7-10=hard
function levelDiff(idx){return idx<3?0:idx<6?1:2}
function levelPcs(numCells,diff){
  if(diff===0)return Math.max(3,Math.ceil(numCells/7));
  if(diff===1)return Math.max(5,Math.ceil(numCells/3.8));
  return Math.min(14,Math.max(8,Math.ceil(numCells/2.5)));
}
function levelHints(diff){return diff+1}

function buildPieceSVG(cells,color,size){
  const mr=Math.min(...cells.map(c=>c[0])),mc=Math.min(...cells.map(c=>c[1]));
  const xr=Math.max(...cells.map(c=>c[0])),xc=Math.max(...cells.map(c=>c[1]));
  const w=(xc-mc+1)*(size+GAP),h=(xr-mr+1)*(size+GAP);
  let s=`<svg width="${w}" height="${h}" style="display:block">`;
  cells.forEach(([r,c])=>{const x=(c-mc)*(size+GAP),y=(r-mr)*(size+GAP),rx=size>28?5:4;s+=`<rect x="${x}" y="${y}" width="${size}" height="${size}" rx="${rx}" fill="${color}" stroke="rgba(0,0,0,.18)" stroke-width="1"/><rect x="${x+2}" y="${y+2}" width="${size-4}" height="${size*.35}" rx="3" fill="rgba(255,255,255,.22)"/>`;});
  return s+'</svg>';
}

function buildThumbSVG(shape,size,color){
  const{cells,gridW,gridH}=parseShape(shape.s);
  const cs=size/Math.max(gridW,gridH);
  const fill=color?color+'55':'rgba(100,100,120,.25)';
  const stroke=color?color+'33':'none';
  let s=`<svg width="${gridW*cs}" height="${gridH*cs}" style="display:block">`;
  cells.forEach(([r,c])=>{s+=`<rect x="${c*cs}" y="${r*cs}" width="${cs*.88}" height="${cs*.88}" rx="${cs>6?3:1.5}" fill="${fill}" stroke="${stroke}" stroke-width=".5"/>`;});
  return s+'</svg>';
}

const LS_PROGRESS='bp-progress',LS_THEME='bp-theme',LS_SOUND='bp-sound';
function loadStored(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}

// ════════════════════════════════════════
//  SOUND — Web Audio synth (no files, offline)
// ════════════════════════════════════════
const Sound=(()=>{
  let ctx=null,enabled=loadStored(LS_SOUND,true);
  function ac(){if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return null}}if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(freq,dur,type,vol,when){
    const c=ac();if(!c)return;const t=c.currentTime+(when||0);
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.012);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+.03);
  }
  return{
    get enabled(){return enabled},
    init(){ac();},
    toggle(){enabled=!enabled;saveStored(LS_SOUND,enabled);if(enabled){ac();this.place();}return enabled;},
    pick(){if(enabled)tone(440,.07,'triangle',.10);},
    place(){if(!enabled)return;tone(523.25,.09,'triangle',.16);tone(784,.11,'sine',.10,.04);},
    bad(){if(!enabled)return;tone(160,.16,'sawtooth',.12);tone(120,.18,'sawtooth',.07,.02);},
    hint(){if(!enabled)return;tone(880,.12,'sine',.12);tone(1174.7,.14,'sine',.09,.09);},
    win(){if(!enabled)return;[523.25,659.25,784,1046.5].forEach((f,i)=>tone(f,.45,'triangle',.15,i*.11));tone(1568,.5,'sine',.08,.46);}
  };
})();
window.addEventListener('pointerdown',()=>Sound.init(),{once:true});

function renderCarousel(dir){

    gsap.fromTo('#car-play',{opacity:0,y:6},{opacity:1,y:0,duration:.25,delay:.15,ease:'power2.out'});
  }
}

function animateCarousel(dir){
  gsap.to('#car-name',{x:dir*-40,opacity:0,duration:.15,ease:'power2.in'});
  gsap.to('.carousel-icon',{opacity:0,scale:.5,duration:.12,ease:'power2.in'});

function startCategory(ci,li){
  S.mode='category';S.catIdx=ci;S.levelIdx=li;
  const diff=levelDiff(li);S.diffIdx=diff;
  initLevel(ci,li,diff);
  transitionToGame();
}
let lastQuick=null;
function startQuick(diff){
  S.mode='quick';S.diffIdx=diff;
  let ci,li;
  do{
    ci=Math.floor(Math.random()*CATEGORIES.length);
    li=Math.floor(Math.random()*CATEGORIES[ci].shapes.length);
  }while(lastQuick===ci+'-'+li);
  lastQuick=ci+'-'+li;
  S.catIdx=ci;S.levelIdx=li;
  initLevel(ci,li,diff);
  transitionToGame();
}
function initLevel(ci,li,diff){
  const shape=CATEGORIES[ci].shapes[li];
  const{cells:tc,gridW,gridH}=parseShape(shape.s);
  const np=levelPcs(tc.length,diff);
  const seed=(ci+1)*1000+(li+1)*100+(diff+1)*10+42;
  S.pieces=decompose(tc,np,seed);
  S.targetCells=tc;S.targetSet=new Set(tc.map(([r,c])=>ky(r,c)));
  S.gridW=gridW;S.gridH=gridH;
  S.board={};S.placed={};S.won=false;
  S.hintsLeft=levelHints(diff);S.activeHint=null;
  if(S.hintTimer)clearTimeout(S.hintTimer);
  S.dragging=null;S._hover=null;
}
function transitionToGame(){
  gsap.to('#menu',{opacity:0,y:-20,duration:.3,ease:'power2.in',onComplete:()=>{
    document.getElementById('menu').style.display='none';
    document.getElementById('game').style.display='flex';
    gsap.set('#game',{opacity:0,y:20});
    gsap.to('#game',{opacity:1,y:0,duration:.35,ease:'power3.out'});
    buildGame();
  }});
}

let cellMap=new Map();
function buildBoard(){
  const wrap=document.getElementById('board-wrap');
  wrap.style.width=(S.gridW*STEP+20)+'px';wrap.style.height=(S.gridH*STEP+20)+'px';
  wrap.innerHTML='';cellMap=new Map();

  S.targetCells.forEach(([r,c])=>{sil+=`<rect x="${c*STEP}" y="${r*STEP}" width="${CELL}" height="${CELL}" rx="5" fill="${silColor}" opacity=".09"/>`;});

    cell.innerHTML='<div class="shine"></div>';

    gsap.set(cell,{scale:0,opacity:0});
    gsap.to(cell,{scale:1,opacity:1,duration:.35,delay:.04+i*.01,ease:'back.out(2.5)'});
    cell.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      const k=ky(r,c);
      if(S.board[k]!==undefined&&!S.won)startDrag(S.board[k],e);
    });
  });
}

function buildTray(){
  const c=document.getElementById('tray-pieces');c.innerHTML='';
  const up=S.pieces.map((p,i)=>({...p,idx:i})).filter((_,i)=>!S.placed[i]&&S.dragging!==i);
  updateTrayCount();
  if(!up.length){c.innerHTML='<span style="color:var(--sub);font-size:11px;font-style:italic;width:100%;text-align:center">All placed!</span>';return;}
  up.forEach((p,i)=>{
    const col=PALETTE[p.colorIdx%PALETTE.length];
    const el=document.createElement('div');el.className='tray-piece';el.dataset.idx=p.idx;
    el.innerHTML=buildPieceSVG(p.normalized,col,TRAY_CELL);
    c.appendChild(el);
    gsap.set(el,{scale:0,opacity:0,rotation:gsap.utils.random(-12,12)});
    gsap.to(el,{scale:1,opacity:1,rotation:0,duration:.45,delay:.08+i*.03,ease:'elastic.out(1,.6)'});
    el.addEventListener('pointerenter',()=>{if(S.dragging!==null)return;gsap.to(el,{scale:1.1,duration:.15});el.style.boxShadow=`0 4px 16px ${col}44`;});
    el.addEventListener('pointerleave',()=>{gsap.to(el,{scale:1,duration:.15});el.style.boxShadow='none';});
    el.addEventListener('pointerdown',e=>startDrag(p.idx,e));
  });
}

// ════════════════════════════════════════
//  DRAG & DROP
// ════════════════════════════════════════
function startDrag(idx,e){
  if(S.won)return;e.preventDefault();e.stopPropagation();clearHint();Sound.pick();
  const cx=e.clientX,cy=e.clientY;
  if(S.placed[idx])removePiece(idx);
  const piece=S.pieces[idx],nr=piece.normalized;
  const mxR=Math.max(...nr.map(c=>c[0])),mxC=Math.max(...nr.map(c=>c[1]));
  const pw=(mxC+1)*STEP,ph=(mxR+1)*STEP;
  S.dragging=idx;
  S.dragOff={x:pw/2,y:ph/2+70};
  const ghost=document.getElementById('drag-ghost');
  const col=PALETTE[piece.colorIdx%PALETTE.length];
  ghost.innerHTML=buildPieceSVG(piece.normalized,col,CELL);
  ghost.style.display='block';
  ghost.style.left=(cx-S.dragOff.x)+'px';ghost.style.top=(cy-S.dragOff.y)+'px';
  gsap.set(ghost,{scale:1,x:0,y:0,rotation:0,opacity:1});
  gsap.to(ghost,{opacity:.92,scale:1.05,duration:.2,ease:'back.out(2)'});
  ghost.style.filter=`drop-shadow(0 14px 30px rgba(0,0,0,.55)) drop-shadow(0 0 12px ${col}55)`;
  document.body.style.touchAction='none';document.body.style.overflow='hidden';
  buildTray();
  window.addEventListener('pointermove',onMove,{passive:false});
  window.addEventListener('pointerup',onUp);
  window.addEventListener('pointercancel',onUp);
}
function onMove(e){
  if(S.dragging===null)return;e.preventDefault();
  const cx=e.clientX,cy=e.clientY;
  const ghost=document.getElementById('drag-ghost');
  const fx=cx-S.dragOff.x,fy=cy-S.dragOff.y;
  const wrap=document.getElementById('board-wrap'),rect=wrap.getBoundingClientRect();
  const gc=Math.round((fx-rect.left-10)/STEP),gr=Math.round((fy-rect.top-10)/STEP);
  const over=gc>=-1&&gc<=S.gridW&&gr>=-1&&gr<=S.gridH;
  if(over){
    const sx=rect.left+10+gc*STEP,sy=rect.top+10+gr*STEP;
    const bl=.3;
    gsap.to(ghost,{left:fx+(sx-fx)*bl,top:fy+(sy-fy)*bl,duration:.12,ease:'power1.out',overwrite:true});
  }else{
    gsap.to(ghost,{left:fx,top:fy,duration:.08,ease:'none',overwrite:true});
  }
  S._hover={r:gr,c:gc};
  const piece=S.pieces[S.dragging],valid=canPlace(piece.normalized,gr,gc,S.dragging);
  clearHover();
  piece.normalized.forEach(([r,c])=>{const cell=getCell(r+gr,c+gc);if(cell){cell.classList.add(valid?'hover-good':'hover-bad');hoverCells.push(cell);}});
}
function onUp(){
  window.removeEventListener('pointermove',onMove);
  window.removeEventListener('pointerup',onUp);
  window.removeEventListener('pointercancel',onUp);
  if(S.dragging===null)return;
  const idx=S.dragging,piece=S.pieces[idx],h=S._hover;
  const ghost=document.getElementById('drag-ghost');
  gsap.killTweensOf(ghost);
  if(h&&canPlace(piece.normalized,h.r,h.c,idx)){
    placePiece(idx,h.r,h.c);
    gsap.to(ghost,{opacity:0,scale:.5,duration:.2,ease:'power2.in',onComplete:()=>{ghost.style.display='none';}});
  }else{
    if(h)shakeBoard();
    gsap.to(ghost,{opacity:0,y:'+=30',scale:.6,duration:.25,ease:'power2.in',onComplete:()=>{ghost.style.display='none';}});
  }
  S.dragging=null;S._hover=null;clearHover();
  document.body.style.touchAction='';document.body.style.overflow='';
  buildTray();
}
let hoverCells=[];
function clearHover(){hoverCells.forEach(c=>c.classList.remove('hover-good','hover-bad'));hoverCells=[];}
function canPlace(cells,bR,bC,excl){for(const[r,c]of cells){const k=ky(r+bR,c+bC);if(!S.targetSet.has(k))return false;if(S.board[k]!==undefined&&S.board[k]!==excl)return false;}return true;}
function getCell(r,c){return cellMap.get(ky(r,c));}

function placePiece(idx,bR,bC){
  clearHint();Sound.place();if(navigator.vibrate)navigator.vibrate(9);
  const piece=S.pieces[idx],col=PALETTE[piece.colorIdx%PALETTE.length];
  Object.keys(S.board).forEach(k=>{if(S.board[k]===idx)delete S.board[k];});
  piece.normalized.forEach(([r,c])=>{S.board[ky(r+bR,c+bC)]=idx;});
  S.placed[idx]=true;
  piece.normalized.forEach(([r,c],i)=>{
    const cell=getCell(r+bR,c+bC);if(!cell)return;
    gsap.killTweensOf(cell);
    cell.style.background=col;cell.style.border='none';cell.classList.add('filled');
    gsap.fromTo(cell,{scale:1.25},{scale:1,duration:.35,delay:i*.02,ease:'elastic.out(1.2,.4)'});
    gsap.fromTo(cell,{boxShadow:`0 0 16px ${col}88`},{boxShadow:`0 0 0px ${col}00`,duration:.5,delay:i*.02});
  });
  updateProgress();buildTray();checkWin();
}
function removePiece(idx){
  const removed=[];
  Object.keys(S.board).forEach(k=>{if(S.board[k]===idx){removed.push(k);delete S.board[k];}});
  delete S.placed[idx];
  removed.forEach(k=>{const[r,c]=k.split(',').map(Number);const cell=getCell(r,c);if(!cell)return;
    cell.style.background='var(--cell-bg)';cell.style.border='1px solid var(--cell-border)';cell.classList.remove('filled');
    gsap.fromTo(cell,{scale:.8,opacity:.5},{scale:1,opacity:1,duration:.25,ease:'back.out(2)'});
  });
  updateProgress();
}
function shakeBoard(){Sound.bad();if(navigator.vibrate)navigator.vibrate(22);gsap.to('#board-wrap',{x:-5,duration:.05,yoyo:true,repeat:5,ease:'power1.inOut',onComplete:()=>gsap.set('#board-wrap',{x:0})});}

// ════════════════════════════════════════
//  HINT
// ════════════════════════════════════════
function useHint(){
  if(S.hintsLeft<=0||S.won)return;
  const up=S.pieces.map((_,i)=>i).filter(i=>!S.placed[i]);if(!up.length)return;
  const pick=up[Math.floor(Math.random()*up.length)];
  S.hintsLeft--;S.activeHint=pick;updateHintBtn();Sound.hint();
  const piece=S.pieces[pick],col=PALETTE[piece.colorIdx%PALETTE.length];
  piece.cells.forEach(([r,c])=>{const cell=getCell(r,c);if(!cell||cell.classList.contains('filled'))return;
    cell.style.border=`2px solid ${col}88`;
    gsap.to(cell,{background:`${col}30`,duration:.5,repeat:-1,yoyo:true,ease:'sine.inOut',overwrite:'auto'});
    gsap.fromTo(cell,{scale:.92},{scale:1.03,duration:.6,repeat:-1,yoyo:true,ease:'sine.inOut'});
  });
  const tp=document.querySelector(`.tray-piece[data-idx="${pick}"]`);
  if(tp){tp.classList.add('hinted');tp.style.borderColor=col+'88';tp.style.background=col+'15';
    gsap.to(tp,{scale:1.08,duration:.4,repeat:-1,yoyo:true,ease:'sine.inOut'});}
  if(S.hintTimer)clearTimeout(S.hintTimer);
  S.hintTimer=setTimeout(clearHint,3500);
}
function clearHint(){
  if(S.activeHint===null)return;
  const piece=S.pieces[S.activeHint];
  piece.cells.forEach(([r,c])=>{const cell=getCell(r,c);if(!cell||cell.classList.contains('filled'))return;
    gsap.killTweensOf(cell);cell.style.background='var(--cell-bg)';cell.style.border='1px solid var(--cell-border)';gsap.to(cell,{scale:1,duration:.2});});
  const tp=document.querySelector(`.tray-piece[data-idx="${S.activeHint}"]`);
  if(tp){gsap.killTweensOf(tp);tp.classList.remove('hinted');tp.style.borderColor='';tp.style.background='';gsap.to(tp,{scale:1,duration:.2});}
  S.activeHint=null;if(S.hintTimer){clearTimeout(S.hintTimer);S.hintTimer=null;}
}
function updateHintBtn(){document.getElementById('hint-count').textContent=S.hintsLeft;document.getElementById('hint-btn').disabled=S.hintsLeft<=0;}

// ════════════════════════════════════════
//  PROGRESS & WIN
// ════════════════════════════════════════
function updateProgress(){
  const tot=S.pieces.length,pl=Object.keys(S.placed).length;
  document.getElementById('progress-fill').style.width=Math.round(pl/tot*100)+'%';
  const dc=['#4cc9f0','#ffd54f','#ff3d7f'];
  document.getElementById('progress-fill').style.background=S.won?'var(--green)':`linear-gradient(90deg,#4cc9f0,${dc[S.diffIdx]})`;
  updateTrayCount();
}
function updateTrayCount(){document.getElementById('tray-count').textContent=Object.keys(S.placed).length+'/'+S.pieces.length+' placed';}

function checkWin(){
  if(S.won)return;
  if(![...S.targetSet].every(k=>S.board[k]!==undefined)||!Object.keys(S.board).length)return;
  S.won=true;
  if(S.mode==='category')setCompleted(S.catIdx,S.levelIdx);
  celebrateWin();
}
function celebrateWin(){
  Sound.win();if(navigator.vibrate)navigator.vibrate([0,40,30,40,30,70]);
  document.querySelectorAll('.cell.filled').forEach((cell,i)=>{
    gsap.to(cell,{scale:1.12,duration:.18,delay:i*.012,ease:'power2.out',onComplete:()=>gsap.to(cell,{scale:1,duration:.4,ease:'elastic.out(1.2,.3)'})});
    gsap.fromTo(cell,{boxShadow:`0 0 0px ${cell.style.background}`},{boxShadow:`0 0 16px ${cell.style.background}`,duration:.3,delay:i*.012,yoyo:true,repeat:1});
  });
  spawnParticles(35);
  // Hide next arrow if last level or quick play
  const nextBtn=document.getElementById('win-next');
  nextBtn.style.display=(S.mode==='category'&&S.levelIdx<9)?'flex':'none';
  // Show bar after cell animation completes
  const delay=S.targetCells.length*.012+.4;
  setTimeout(()=>{
    const bar=document.getElementById('win-bar');
    bar.style.display='flex';
    const btns=[...bar.children].filter(b=>b.style.display!=='none');
    btns.forEach((b,i)=>{
      gsap.fromTo(b,{scale:0,opacity:0},{scale:1,opacity:1,duration:.3,delay:i*.06,ease:'back.out(2)'});
    });
  },delay*1000);
  gsap.to('#tray',{opacity:0,y:15,duration:.25});
}
function spawnParticles(n){
  const wrap=document.getElementById('board-wrap'),rect=wrap.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=4+Math.random()*7;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.background=PALETTE[Math.floor(Math.random()*PALETTE.length)];
    p.style.left=cx+'px';p.style.top=cy+'px';document.body.appendChild(p);
    const a=(Math.PI*2*i)/n+gsap.utils.random(-.3,.3),d=gsap.utils.random(70,220);
    gsap.to(p,{x:Math.cos(a)*d,y:Math.sin(a)*d-gsap.utils.random(40,130),opacity:0,rotation:gsap.utils.random(-360,360),duration:gsap.utils.random(.7,1.4),delay:gsap.utils.random(0,.25),ease:'power2.out',onComplete:()=>p.remove()});
  }
}

// ════════════════════════════════════════
//  NAV
// ════════════════════════════════════════
function goToMenu(){
  clearHint();
  gsap.to('#game',{opacity:0,y:20,duration:.25,ease:'power2.in',onComplete:()=>{
    document.getElementById('game').style.display='none';
    document.getElementById('menu').style.display='flex';
    gsap.set('#menu',{opacity:0,y:-15});gsap.to('#menu',{opacity:1,y:0,duration:.3,ease:'power3.out'});
    buildMenu();
  }});
}
function goNextLevel(){
  clearHint();
  const nextI=S.levelIdx+1;
  gsap.to('.cell',{scale:0,opacity:0,duration:.2,stagger:.006,ease:'power2.in',onComplete:()=>{
    startCategory(S.catIdx,nextI);
  }});
}
function resetLevel(){
  clearHint();
  gsap.to('.cell.filled',{scale:0,rotation:gsap.utils.random(-15,15),duration:.2,stagger:.008,ease:'power2.in',onComplete:()=>{
    S.board={};S.placed={};S.won=false;
    S.hintsLeft=levelHints(S.diffIdx);S.activeHint=null;S.dragging=null;
    buildGame();
  }});
}

document.getElementById('btn-back').addEventListener('click',goToMenu);
document.getElementById('btn-reset').addEventListener('click',resetLevel);

// Theme
let isDark=true;
function setTheme(dark){
  isDark=dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-toggle').innerHTML='<span class="material-icons'+(dark?'':' light')+'">'+(dark?'dark_mode':'light_mode')+'</span>';
  saveStored(LS_THEME,dark?'dark':'light');
}
document.getElementById('theme-toggle').addEventListener('click',()=>{
  setTheme(!isDark);
  gsap.fromTo('#theme-toggle',{rotation:-180,scale:.7},{rotation:0,scale:1,duration:.4,ease:'back.out(2)'});
});

// Sound toggle
function updateSoundBtn(){
  const b=document.getElementById('sound-toggle');
  b.classList.toggle('muted',!Sound.enabled);
  b.innerHTML='<span class="material-icons">'+(Sound.enabled?'volume_up':'volume_off')+'</span>';
}
document.getElementById('sound-toggle').addEventListener('click',()=>{
  Sound.toggle();updateSoundBtn();
  gsap.fromTo('#sound-toggle',{scale:.7},{scale:1,duration:.35,ease:'back.out(2)'});
});
updateSoundBtn();

setTheme(loadStored(LS_THEME,'dark')!=='light');
buildMenu();
</script>
